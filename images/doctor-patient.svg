<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" role="img" aria-labelledby="title">
  <title id="title">Médico(a) atendendo paciente sentado</title>
  <rect width="520" height="360" fill="none" />

  <!-- Fundo sutil -->
  <ellipse cx="260" cy="320" rx="220" ry="30" fill="rgba(11,108,243,0.06)" />

  <!-- Paciente sentado (à direita) -->
  <g transform="translate(320,120)">
    <circle cx="80" cy="30" r="20" fill="#f3d9c9" />
    <rect x="60" y="48" width="40" height="60" rx="8" fill="#6c8aa6" />
    <rect x="40" y="108" width="80" height="8" rx="4" fill="#6c8aa6" />
  </g>

  <!-- Médico(a) (à esquerda) -->
  <g transform="translate(160,110)">
    <circle cx="40" cy="24" r="20" fill="#fde0c8" />
    <rect x="18" y="46" width="44" height="72" rx="10" fill="#0b6cf3" />
    <!-- Jaleco branco sobreposto -->
    <rect x="26" y="50" width="28" height="68" rx="8" fill="#ffffff" />
    <!-- Estetoscópio simplificado -->
    <path d="M44 58 C52 64, 52 74, 44 80" stroke="#333" stroke-width="3" fill="none" />
    <circle cx="46" cy="82" r="4" fill="#333" />
  </g>

  <!-- Mesa/ambiente -->
  <rect x="240" y="160" width="140" height="6" fill="#dfeefb" rx="3" />
</svg>